name: Send Daily Sunset Text

on:
  schedule:
    # This runs daily at 18:00 UTC. Adjust this time to whenever 
    # you want the text to go out (e.g., a few hours before sunset).
    - cron: '0 21 * * *'
  workflow_dispatch: # This allows you to click a button to test it manually anytime

jobs:
  send_text:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4.2.2 # Explicitly uses updated security builds

    - name: Set Up Python
      uses: actions/setup-python@v5.3.0

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script
      # This injects your secure GitHub Secrets into the script's environment variables
      env:
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
        RECIP_PHONE_NUMBER: ${{ secrets.RECIP_PHONE_NUMBER }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        RECIP_EMAIL: ${{ secrets.RECIP_EMAIL }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      run: python sunset.py